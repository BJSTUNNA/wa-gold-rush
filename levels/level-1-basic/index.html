<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Gold Rush - Level 1</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .student-identity-banner {
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .student-identity-banner.hidden { display: none; }
        .pause-banner {
            background: #f44336;
            color: #fff;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .pause-banner.hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">

        <h1>⛏️ WA Gold Rush - Level 1</h1>
        <p style="text-align: center; color: #666; font-size: 12px;">Basic Mining (10 Rounds)</p>

        <div id="student-identity-banner" class="student-identity-banner hidden"></div>
        <div id="pause-banner" class="pause-banner hidden">⏸️ Game paused by teacher.</div>

        <h2>Cash: $<span id="cash">100.00</span></h2>

        <h2>Round: <span id="round">1</span>/10</h2>

        <h3>Allocate Your Investments</h3>
        
        <div class="investment-grid">
            <div class="investment-box">
                <label for="investment-safe">Safe Dig (10%)</label>
                <input type="number" id="investment-safe" value="0" min="0">
            </div>

            <div class="investment-box">
                <label for="investment-medium">Medium Dig (50%)</label>
                <input type="number" id="investment-medium" value="0" min="0">
            </div>

            <div class="investment-box">
                <label for="investment-deep">Deep Vein Dig (300%)</label>
                <input type="number" id="investment-deep" value="0" min="0">
            </div>
        </div>

        <p class="total-investment">Total Investment: $<span id="total-investment">0.00</span></p>

        <br>

        <!-- Give the buttons IDs so script.js can attach listeners -->
        <button id="playButton" type="button">Roll Dice</button>

        <hr>

        <br><br>

        <button id="resetButton" type="button">Restart Game</button>
        
        <h3>Dice Roll</h3>
        <p id="dice">-</p>

        <h3>Results</h3>
        <div id="results-container">
            <p id="result">Start mining!</p>
        </div>

    </div>

  <script src="../../shared/leaderboard-store.js"></script>
  <script src="script.js"></script>

</body>
</html>
